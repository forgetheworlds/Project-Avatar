# Drone Control System - Pre-commit Hooks
# Safety-critical code quality enforcement

# Minimum pre-commit version
minimum_pre_commit_version: "3.4.0"

# Default language version for hooks
default_language_version:
  python: python3.11

# Default stages for hooks
default_stages: [pre-commit, pre-push]

repos:
  # ==========================================================================
  # META HOOKS
  # ==========================================================================
  - repo: meta
    hooks:
      - id: check-useless-excludes
        name: Check useless excludes
        stages: [pre-commit]

  # ==========================================================================
  # GENERAL FILE CHECKS
  # ==========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        stages: [pre-commit]
        exclude: '\.md$|\.svg$'

      - id: end-of-file-fixer
        name: Fix end of files
        stages: [pre-commit]
        exclude: '\.md$'

      - id: check-yaml
        name: Check YAML syntax
        stages: [pre-commit]
        args: [--unsafe]

      - id: check-toml
        name: Check TOML syntax
        stages: [pre-commit]

      - id: check-json
        name: Check JSON syntax
        stages: [pre-commit]

      - id: check-xml
        name: Check XML syntax
        stages: [pre-commit]

      - id: check-added-large-files
        name: Check for large files
        stages: [pre-commit]
        args: [--maxkb=1000]
        exclude: '\.pkl$|\.h5$|\.onnx$'

      - id: check-case-conflict
        name: Check for case conflicts
        stages: [pre-commit]

      - id: check-merge-conflict
        name: Check for merge conflicts
        stages: [pre-commit]
        args: [--assume-in-merge]

      - id: check-symlinks
        name: Check for broken symlinks
        stages: [pre-commit]

      - id: destroyed-symlinks
        name: Detect destroyed symlinks
        stages: [pre-commit]

      - id: check-executables-have-shebangs
        name: Check executables have shebangs
        stages: [pre-commit]

      - id: check-shebang-scripts-are-executable
        name: Check shebang scripts are executable
        stages: [pre-commit]

      - id: detect-private-key
        name: Detect private keys
        stages: [pre-commit]
        exclude: "tests/fixtures/mock_keys/*"

      - id: forbid-new-submodules
        name: Forbid new submodules
        stages: [pre-commit]

      - id: mixed-line-ending
        name: Fix mixed line endings
        stages: [pre-commit]
        args: [--fix=lf]

      - id: fix-byte-order-marker
        name: Fix UTF-8 byte order marker
        stages: [pre-commit]

      - id: check-docstring-first
        name: Check docstring is first
        stages: [pre-commit]

      - id: requirements-txt-fixer
        name: Fix requirements.txt formatting
        stages: [pre-commit]
        files: 'requirements.*\.txt$'

  # ==========================================================================
  # PYTHON CODE FORMATTING
  # ==========================================================================
  - repo: https://github.com/psf/black
    rev: 23.7.0
    hooks:
      - id: black
        name: Black code formatter
        stages: [pre-commit]
        language_version: python3.11
        args:
          - --line-length=100
          - --target-version=py311
          - --safe

  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        name: isort import sorter
        stages: [pre-commit]
        args:
          - --profile=black
          - --line-length=100
          - --check-only
          - --diff

  # ==========================================================================
  # RUFF - Fast Python Linter (Replaces multiple flake8 plugins)
  # ==========================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.0.285
    hooks:
      - id: ruff
        name: Ruff linter
        stages: [pre-commit]
        args:
          - --fix
          - --exit-non-zero-on-fix
          - --show-fixes
          - --target-version=py311

  # ==========================================================================
  # TYPE CHECKING - MYPY (STRICT MODE)
  # ==========================================================================
  - repo: local
    hooks:
      - id: mypy
        name: mypy strict type check
        entry: mypy
        language: system
        types: [python]
        pass_filenames: true
        stages: [pre-commit]
        args:
          - --strict
          - --show-error-codes
          - --show-column-numbers
          - --pretty
          - --warn-unreachable
          - --warn-redundant-casts
          - --warn-unused-ignores
        exclude: 'tests/|conftest\.py'

  # ==========================================================================
  # STATIC ANALYSIS - PYLINT (SAFETY-FOCUSED)
  # ==========================================================================
  - repo: local
    hooks:
      - id: pylint
        name: pylint safety analysis
        entry: pylint
        language: system
        types: [python]
        pass_filenames: true
        stages: [pre-push]  # Run on push, not every commit (slower)
        args:
          - --rcfile=pyproject.toml
          - --fail-under=9.0
          - --output-format=colorized
          - --reports=no
        exclude: 'tests/|conftest\.py'

  # ==========================================================================
  # SECURITY SCANNING - BANDIT
  # ==========================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: bandit security scan
        stages: [pre-commit]
        args:
          - -c
          - .bandit.yaml
          - -ll
          - -ii
          - -r
        exclude: 'tests/|conftest\.py'

  # ==========================================================================
  # DEPENDENCY SECURITY - SAFETY
  # ==========================================================================
  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.3.2
    hooks:
      - id: python-safety-dependencies-check
        name: Safety dependency check
        stages: [pre-push]
        files: 'requirements.*\.txt$|pyproject\.toml$'

  # ==========================================================================
  # ADDITIONAL PYTHON CHECKS
  # ==========================================================================
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.10.1
    hooks:
      - id: pyupgrade
        name: Python upgrade checks
        stages: [pre-commit]
        args:
          - --py311-plus
          - --keep-runtime-typing

  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        name: Docstring style check
        stages: [pre-push]
        args:
          - --convention=google
          - --add-ignore=D100,D104  # Missing docstrings in public modules/packages

  # ==========================================================================
  # TEST VALIDATION
  # ==========================================================================
  - repo: local
    hooks:
      - id: pytest-check
        name: pytest unit tests
        entry: python -m pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
        args:
          - -q
          - tests
          - --tb=short
          - --timeout=60
          - -m
          - "not slow and not hardware_in_loop"

      - id: coverage-check
        name: Coverage threshold check
        entry: python -m pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
        args:
          - --cov=avatar
          - --cov-fail-under=90
          - --cov-report=term-missing
          - tests
          - -m
          - "not slow and not hardware_in_loop"

  # ==========================================================================
  # FILE-SPECIFIC CHECKS
  # ==========================================================================
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa
        name: Check blanket noqa comments
        stages: [pre-commit]

      - id: python-check-blanket-type-ignore
        name: Check blanket type:ignore comments
        stages: [pre-commit]

      - id: python-no-log-warn
        name: Check for deprecated logging.warn
        stages: [pre-commit]

      - id: python-use-type-annotations
        name: Check for type annotations
        stages: [pre-commit]

      - id: text-unicode-replacement-char
        name: Check for unicode replacement chars
        stages: [pre-commit]

  # ==========================================================================
  # GIT-SPECIFIC CHECKS
  # ==========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: no-commit-to-branch
        name: Prevent direct commits to protected branches
        stages: [pre-commit]
        args: [--branch, main, --branch, master, --branch, develop]

  # ==========================================================================
  # CUSTOM SAFETY CHECKS
  # ==========================================================================
  - repo: local
    hooks:
      - id: check-safety-comments
        name: Check for SAFETY comments on critical changes
        entry: scripts/check_safety_comments.py
        language: python
        pass_filenames: true
        stages: [pre-push]
        types: [python]

      - id: check-adr-for-architectural-changes
        name: Check ADR for architectural changes
        entry: scripts/check_adr.py
        language: python
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: check-import-cycles
        name: Check for import cycles
        entry: python -c "import avatar"
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

# ============================================================================
# CI-SPECIFIC CONFIGURATION
# ============================================================================
ci:
  autofix_commit_msg: "[pre-commit.ci] auto fixes from pre-commit.com hooks"
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: [pylint, pytest-check, coverage-check]  # Skip slow checks in CI
  submodules: false
