# Docker Compose for Project Avatar simulation
# Wave 1 D4.3-D4.6: SIH and Gazebo profiles with healthchecks
#
# Usage:
#   docker compose --profile sih up -d        # SIH simulation
#   docker compose --profile gazebo up -d     # Gazebo simulation
#   docker compose --profile sih-test up -d   # SIH with tests
#   docker compose --profile gazebo-test up -d # Gazebo with tests
#   docker compose down --remove-orphans      # Stop all

services:
  # PX4 SITL SIH simulation (lightweight, no physics engine)
  px4-sih:
    build:
      context: ..
      dockerfile: docker/sim-sih/Dockerfile
    profiles:
      - sih
      - sih-test
    ports:
      - "14540:14540/udp"
    volumes:
      - ./artifacts:/artifacts
    environment:
      - SIH_VEHICLE_TARGET=sihsim_quadx
    healthcheck:
      test: ["python3", "/app/docker/shared/wait-for-px4.py", "--timeout-s", "5"]
      interval: 5s
      timeout: 10s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  # PX4 SITL Gazebo simulation (full physics)
  px4-gazebo:
    build:
      context: ..
      dockerfile: docker/sim-gazebo/Dockerfile
    profiles:
      - gazebo
      - gazebo-test
    ports:
      - "14540:14540/udp"
    volumes:
      - ./artifacts:/artifacts
    environment:
      - GAZEBO_MODEL_PATH=/px4/Tools/simulation/gz/models
    healthcheck:
      test: ["python3", "/app/docker/shared/wait-for-px4.py", "--timeout-s", "5"]
      interval: 5s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # Avatar MCP server
  avatar-mcp:
    build:
      context: ..
      dockerfile: docker/mcp-server/Dockerfile
    profiles:
      - sih
      - gazebo
      - sih-test
      - gazebo-test
    depends_on:
      px4-sih:
        condition: service_healthy
        required: false
      px4-gazebo:
        condition: service_healthy
        required: false
    volumes:
      - ./artifacts:/artifacts
    environment:
      - MAVSDK_UDP=udp://:14540
    healthcheck:
      test: ["python3", "/app/docker/shared/wait-for-mcp.py"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Test runner for integration tests
  test-runner:
    build:
      context: ..
      dockerfile: docker/test-runner/Dockerfile
    profiles:
      - sih-test
      - gazebo-test
    depends_on:
      avatar-mcp:
        condition: service_healthy
    volumes:
      - ./artifacts:/artifacts
    environment:
      - TEST_MODE=integration
    command: ["pytest", "-v", "/app/tests/integration/"]

volumes:
  artifacts:
    driver: local
