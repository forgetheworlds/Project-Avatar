# Smoke Test: Failsafe RTL Trigger
#
# Tests that the system correctly handles low battery failsafe by
# triggering Return-to-Launch.
#
# SCENARIO:
# 1. Drone takes off to 10m
# 2. Battery drains to 20% (below RTL threshold)
# 3. System should trigger RTL automatically
# 4. Drone returns to home and lands
#
# PASS CRITERIA:
# - Drone enters RTL or HOLD mode within 8s of battery threshold
# - Guardian logs battery warning

id: smoke_failsafe_rtl
kind: smoke_test
description: |
  Tests low-battery failsafe behavior. Drone should trigger RTL when
  battery drops below safety threshold.

backends:
  - mcp_stdio
  - mavsdk

sim:
  tier: sih

timeout_s: 120

stages:
  - id: preflight
    tool: run_preflight
    args: {}
    timeout_s: 30
    on_failure: abort

  - id: takeoff
    tool: arm_and_takeoff
    args:
      altitude: 10.0
      altitude_frame: relative
    timeout_s: 30
    on_failure: abort

  - id: hover
    tool: hold
    args: {}
    timeout_s: 10
    on_failure: continue

injections:
  - at:
      stage: hover
      t_offset_s: 3
    driver: battery_drain
    params:
      drain_rate: 20
      target_percent: 20
      gradual: true

assertions:
  - within_s: 8
    expect:
      flight_mode: [AUTO_RTL, HOLD, RTL]
    message: "Should enter RTL or failsafe mode when battery low"

  - within_s: 15
    expect:
      battery_percent:
        max: 25
    message: "Battery should be at or below threshold"
